app = "multiplayer-fabric-crdb"
primary_region = "yyz"

[build]
  image = "ghcr.io/v-sekai/cockroach:latest"

[env]
  COCKROACH_LISTEN_ADDR = "0.0.0.0:26257"
  COCKROACH_HTTP_ADDR = "0.0.0.0:8080"

[mounts]
  source = "crdb_data"
  destination = "/cockroach/cockroach-data"

# Internal SQL port — not exposed via Fly's HTTP proxy.
# Uro connects over the private 6pn network (fdaa::/8).
[[services]]
  internal_port = 26257
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 26257

# Admin UI — restrict to internal network in production.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"
