app = "multiplayer-fabric-uro"
primary_region = "yyz"

[build]
  image = "ghcr.io/v-sekai-fire/multiplayer-fabric-zone-backend:latest"

[env]
  PHX_HOST = "uro.multiplayer-fabric.fly.dev"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
